<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signal AI Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        
        <div id="alert-box" class="hidden"></div>

        <div id="login-screen" class="screen">
            <div class="logo-area">
                <h2>SIGNAL <span class="highlight">AI ✨</span></h2>
                <p>Authentication Required</p>
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button id="btn-login" class="primary-btn">Secure Login</button>
            <p id="login-status" class="status-text"></p>
        </div>

        <div id="code-screen" class="screen hidden">
            <div class="logo-area">
                <h2>SIGNAL <span class="highlight">AI ✨</span></h2>
                <p>2FA Verification</p>
            </div>
            <div class="form-group">
                <input type="number" id="auth-code" placeholder="Enter 6-Digit Code" required>
            </div>
            <button id="btn-code" class="primary-btn">Verify Code</button>
            <p id="code-status" class="status-text"></p>
        </div>

        <div id="main-screen" class="screen hidden">
            <div class="header">
                <h2>SIGNAL <span class="highlight">AI ✨</span></h2>
            </div>
            
            <div class="controls">
                <select id="pair-select" class="dropdown">
                    <option value="EUR/USD (OTC)">🇪🇺 EUR/USD (OTC)</option>
                    <option value="GBP/JPY (OTC)">🇬🇧 GBP/JPY (OTC)</option>
                    <option value="USD/CAD (OTC)" selected>🇺🇸 USD/CAD (OTC)</option>
                </select>
                <select id="time-select" class="dropdown">
                    <option value="15 SEC">⏱️ 15 sec</option>
                    <option value="1 MIN" selected>⏱️ 1 min</option>
                    <option value="5 MIN">⏱️ 5 min</option>
                </select>
            </div>

            <div class="radar-container">
                <div id="radar" class="radar">
                    <div class="radar-sweep"></div>
                </div>
                <div id="signal-result" class="hidden">
                    <h1 id="result-direction">BUY ⬆️</h1>
                    <p>Accuracy: <span id="result-accuracy">96%</span></p>
                </div>
            </div>

            <button id="btn-scan" class="primary-btn pulse">CALCULATE ENTRY</button>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
